<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GBMap — Fukuoka</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1a1a14;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  gap: 10px;
  font-family: 'Courier New', monospace;
}

h1 { color: #6a8c10; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; font-weight: normal; }

.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
}

select {
  background: #1c2408;
  color: #7a9c10;
  border: 1px solid #3a4c10;
  padding: 4px 8px;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  cursor: pointer;
  letter-spacing: 1px;
}

.mode-label {
  color: #4a6010;
  font-size: 10px;
  letter-spacing: 1px;
}

#map-wrap {
  position: relative;
  overflow: hidden;
  border: 2px solid #3a4c10;
  width: 1024px;
  height: 768px;
  cursor: grab;
}
#map-wrap:active { cursor: grabbing; }

#map {
  position: absolute;
  top: 0; left: 0;
  display: grid;
  grid-template-columns: repeat(20, 256px);
  grid-template-rows: repeat(17, 256px);
  gap: 0;
  will-change: transform;
}

#map img {
  display: block;
  width: 256px;
  height: 256px;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  background: #0f380f;
}

/* エラータイルはフォールバック色のまま表示（alt非表示） */
#map img::after { display: none; }

/* アトリビューション */
#attribution {
  position: absolute;
  bottom: 4px;
  right: 6px;
  font-size: 9px;
  color: #4a6010;
  background: rgba(15, 56, 15, 0.75);
  padding: 2px 6px;
  letter-spacing: 0.5px;
  pointer-events: none;
  user-select: none;
}
#attribution a {
  color: #8bac0f;
  text-decoration: none;
  pointer-events: auto;
}

/* タイル座標デバッグ */
#coord {
  position: absolute;
  top: 4px;
  left: 6px;
  font-size: 9px;
  color: #4a6010;
  background: rgba(15, 56, 15, 0.75);
  padding: 2px 6px;
  letter-spacing: 0.5px;
  pointer-events: none;
}
</style>
</head>
<body>

<h1>GBMap — Fukuoka z14</h1>

<div class="toolbar">
  <span class="mode-label">mode:</span>
  <select id="modeSel">
    <option value="tiles">tiles/ (real data)</option>
    <option value="dummy">dummy (noise)</option>
  </select>
</div>

<div id="map-wrap">
  <div id="map"></div>
  <div id="attribution">
    &copy; <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> contributors
    | rendered by GBMap
  </div>
  <div id="coord"></div>
</div>

<script>
const ZOOM  = 14;
const X_MIN = 14119, X_MAX = 14138;  // 20 tiles
const Y_MIN = 6558,  Y_MAX = 6574;   // 17 tiles
const TILE_W = 20, TILE_H = 17;
const TILE_PX = 256;

// 初期表示: タイルグリッド全体の中央をビュー中央に合わせる
const WORLD_W = TILE_W * TILE_PX;  // 5120
const WORLD_H = TILE_H * TILE_PX;  // 4352
const VIEW_W  = 1024, VIEW_H = 768;
let panX = Math.round((VIEW_W - WORLD_W) / 2);  // -2048
let panY = Math.round((VIEW_H - WORLD_H) / 2);  // -1792

const mapEl  = document.getElementById("map");
const coordEl = document.getElementById("coord");
let mode = "tiles";

// ---- ダミータイル生成 (canvas → dataURL) ----
const C = ["#9bbc0f","#8bac0f","#306230","#0f380f"];

function noise(x, y, seed) {
  let n = (x*374761393 + y*668265263 + seed*2246822519) & 0xffffffff;
  n ^= n >> 13;
  return ((n ^ (n<<17)) * 2246822519) & 0xffffffff;
}
function fbm(x, y, seed, oct) {
  let v=0, amp=1, tot=0;
  for (let i=0;i<oct;i++) {
    v += ((noise(x>>i, y>>i, seed+i*1337) & 255) / 255) * amp;
    tot += amp; amp *= 0.5;
  }
  return v / tot;
}

function makeDummyTile(tx, ty) {
  const cv = document.createElement("canvas");
  cv.width = cv.height = TILE_PX;
  const ctx = cv.getContext("2d");
  const img = ctx.createImageData(TILE_PX, TILE_PX);
  // オフセットとしてタイル座標を seed に混ぜて連続したノイズにする
  const ox = (tx - X_MIN) * TILE_PX;
  const oy = (ty - Y_MIN) * TILE_PX;
  for (let y=0;y<TILE_PX;y++) for (let x=0;x<TILE_PX;x++) {
    const v = fbm(ox+x, oy+y, 42, 4);
    const ci = v < 0.30 ? 3 : v < 0.58 ? 0 : 1;
    const hex = C[ci];
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    const o = (y*TILE_PX+x)*4;
    img.data[o]=r; img.data[o+1]=g; img.data[o+2]=b; img.data[o+3]=255;
  }
  ctx.putImageData(img,0,0);
  // 簡易道路
  ctx.strokeStyle=C[2]; ctx.lineWidth=2;
  const roadY = ((ty - Y_MIN) % 3 === 0) ? TILE_PX/2 : -1;
  const roadX = ((tx - X_MIN) % 4 === 0) ? TILE_PX/2 : -1;
  if (roadY >= 0) { ctx.beginPath(); ctx.moveTo(0,roadY); ctx.lineTo(TILE_PX,roadY); ctx.stroke(); }
  if (roadX >= 0) { ctx.beginPath(); ctx.moveTo(roadX,0); ctx.lineTo(roadX,TILE_PX); ctx.stroke(); }
  return cv.toDataURL("image/png");
}

// ---- タイル描画 ----
function buildMap() {
  mapEl.innerHTML = "";
  for (let ty = Y_MIN; ty <= Y_MAX; ty++) {
    for (let tx = X_MIN; tx <= X_MAX; tx++) {
      const img = document.createElement("img");
      img.width = img.height = TILE_PX;
      if (mode === "tiles") {
        img.src = `tiles/${ZOOM}/${tx}/${ty}.png`;
        // 読み込み失敗時はダミーにフォールバック
        img.onerror = () => { img.src = makeDummyTile(tx, ty); img.onerror = null; };
      } else {
        img.src = makeDummyTile(tx, ty);
      }
      img.title = `${tx}/${ty}`;
      mapEl.appendChild(img);
    }
  }
}

// ---- パン ----
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
const MIN_X = VIEW_W - WORLD_W, MIN_Y = VIEW_H - WORLD_H;

function applyPan() {
  panX = clamp(panX, MIN_X, 0);
  panY = clamp(panY, MIN_Y, 0);
  mapEl.style.transform = `translate(${panX}px,${panY}px)`;
  // 中心タイル座標
  const cx = Math.floor((-panX + VIEW_W/2) / TILE_PX);
  const cy = Math.floor((-panY + VIEW_H/2) / TILE_PX);
  coordEl.textContent = `z${ZOOM}  x:${X_MIN+cx}  y:${Y_MIN+cy}`;
}

// ドラッグ
const wrap = document.getElementById("map-wrap");
let dragging = false, lastX = 0, lastY = 0;
wrap.addEventListener("pointerdown", e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  wrap.setPointerCapture(e.pointerId);
});
wrap.addEventListener("pointermove", e => {
  if (!dragging) return;
  panX += e.clientX - lastX;
  panY += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyPan();
});
wrap.addEventListener("pointerup",     () => { dragging = false; });
wrap.addEventListener("pointercancel", () => { dragging = false; });

// モード切替
document.getElementById("modeSel").onchange = e => {
  mode = e.target.value;
  buildMap();
};

buildMap();
applyPan();
</script>
</body>
</html>
