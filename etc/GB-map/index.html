<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GBMap — device frame</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #eae6da;
  --body: #d9d6c9;
  --body-edge: #c4c1b2;
  --bezel: #1c2408;
  --btn: #b9b6a6;
  --btn-dark: #8d8a7a;
  --ab: #8a5a5f;
  --ab-dark: #6e454a;
  --led-off: #8a8878;
  --led-on: #6ec43a;

  /* 画面サイズ(=タイル1枚分) を可変に。
     360px(小型スマホ)〜256px(本来サイズ)の間で画面幅に応じて伸縮し、
     上限は本来サイズの256pxで固定する。 */
  --screen: clamp(180px, 62vw, 256px);
  --bezel-pad: clamp(10px, 3vw, 16px);
  --dpad-size: clamp(72px, 22vw, 96px);
  --dpad-btn: calc(var(--dpad-size) / 3);
  --round: clamp(34px, 11vw, 46px);
  --device-pad-x: clamp(14px, 4vw, 22px);
}

html, body {
  height: 100%;
}

body {
  background: var(--bg);
  min-height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 12px;
  font-family: 'Courier New', Courier, monospace;
  gap: 16px;
}

.device {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(10px, 2.4vw, 18px);
  padding: clamp(16px, 4vw, 24px) var(--device-pad-x) clamp(18px, 4vw, 26px);
  background: var(--body);
  border: 1px solid var(--body-edge);
  border-radius: 14px 14px 14px 46px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.12);
  width: min(92vw, 360px);
}

.screen-bezel {
  position: relative;
  padding: var(--bezel-pad);
  background: var(--bezel);
  border-radius: 6px;
  width: 100%;
  display: flex;
  justify-content: center;
}

.led {
  position: absolute;
  top: 7px;
  left: 7px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--led-off);
  box-shadow: 0 0 0 0 transparent;
  transition: background 0.15s, box-shadow 0.15s;
}
.led.on {
  background: var(--led-on);
  box-shadow: 0 0 4px 1px rgba(110, 196, 58, 0.7);
}

/* 画面 = タイル1枚分。実ピクセルは可変、内部は常に256x256基準で描画してCSSスケールする */
.screen {
  width: var(--screen);
  height: var(--screen);
  overflow: hidden;
  position: relative;
  background: #0f380f;
  cursor: grab;
  touch-action: none;
}
.screen:active { cursor: grabbing; }
.screen.wheel-pan { cursor: ns-resize; }

/* tileGrid自体は256pxグリッドで組み、screenのサイズに合わせてscaleする */
#tileViewport {
  position: absolute;
  top: 0; left: 0;
  width: 256px;
  height: 256px;
  transform-origin: top left;
}
#tileGrid {
  position: absolute;
  top: 0;
  left: 0;
  display: grid;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
#tileGrid img {
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  background: #0f380f;
}

#locCursor {
  position: absolute;
  width: 18px;
  height: 18px;
  margin-left: -9px;
  margin-top: -9px;
  pointer-events: none;
  display: none;
  z-index: 6;
}
#locCursor svg { width: 100%; height: 100%; }

.coord {
  position: absolute;
  top: 4px;
  left: 4px;
  font-size: 9px;
  padding: 2px 5px;
  letter-spacing: 1px;
  z-index: 5;
}

#attribution {
  position: absolute;
  bottom: 4px;
  left: 4px;
  font-size: 8px;
  letter-spacing: 0.5px;
  padding: 2px 5px;
  z-index: 5;
  pointer-events: none;
  white-space: nowrap;
}

#toast {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 9px;
  padding: 6px 10px;
  letter-spacing: 1px;
  text-align: center;
  z-index: 7;
  display: none;
  line-height: 1.6;
  white-space: pre-line;
}

.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  padding: 2px 6px;
}

.dpad {
  position: relative;
  width: var(--dpad-size);
  height: var(--dpad-size);
  flex-shrink: 0;
}
.dpad-v {
  position: absolute;
  left: var(--dpad-btn); top: 0;
  width: var(--dpad-btn); height: var(--dpad-size);
  background: var(--btn);
  border-radius: 4px;
}
.dpad-h {
  position: absolute;
  left: 0; top: var(--dpad-btn);
  width: var(--dpad-size); height: var(--dpad-btn);
  background: var(--btn);
  border-radius: 4px;
}
.dpad-center {
  position: absolute;
  left: calc(var(--dpad-btn) + 2px); top: calc(var(--dpad-btn) + 2px);
  width: calc(var(--dpad-btn) - 4px); height: calc(var(--dpad-btn) - 4px);
  background: var(--body);
  border-radius: 50%;
}
.dpad-btn {
  position: absolute;
  width: var(--dpad-btn); height: var(--dpad-btn);
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 0;
}
.dpad-btn .tri {
  width: 0; height: 0;
  border: 6px solid transparent;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.dpad-btn.up { left: var(--dpad-btn); top: 0; }
.dpad-btn.up .tri { border-bottom-color: var(--btn-dark); }
.dpad-btn.down { left: var(--dpad-btn); top: calc(var(--dpad-btn) * 2); }
.dpad-btn.down .tri { border-top-color: var(--btn-dark); }
.dpad-btn.left { left: 0; top: var(--dpad-btn); }
.dpad-btn.left .tri { border-right-color: var(--btn-dark); }
.dpad-btn.right { left: calc(var(--dpad-btn) * 2); top: var(--dpad-btn); }
.dpad-btn.right .tri { border-left-color: var(--btn-dark); }

.ab {
  display: flex;
  align-items: flex-end;
  gap: clamp(10px, 3vw, 16px);
  transform: rotate(-18deg);
  flex-shrink: 0;
}
.round {
  width: var(--round); height: var(--round);
  border-radius: 50%;
  border: none;
  background: var(--ab);
  color: var(--ab-dark);
  font-size: clamp(11px, 3vw, 14px);
  font-family: inherit;
  cursor: pointer;
  box-shadow: inset 0 -3px 0 var(--ab-dark);
}
.round.b { margin-bottom: clamp(8px, 2.5vw, 14px); }
.round:active { box-shadow: inset 0 -1px 0 var(--ab-dark); }

.meta-row {
  display: flex;
  justify-content: center;
  gap: clamp(16px, 6vw, 28px);
  width: 100%;
}
.pill {
  width: clamp(46px, 13vw, 56px);
  height: 16px;
  border-radius: 8px;
  border: none;
  background: var(--btn-dark);
  color: var(--body);
  font-size: 9px;
  font-family: inherit;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transform: rotate(-18deg);
}
.pill:active { background: var(--btn); }

.hint {
  max-width: 320px;
  font-size: 10px;
  line-height: 1.7;
  color: #8a8678;
  text-align: center;
  padding: 0 8px;
}
</style>
</head>
<body>

<div class="device">
  <div class="screen-bezel">
    <div class="led" id="led"></div>
    <div class="screen" id="screen">
      <div id="tileViewport">
        <div id="tileGrid"></div>
        <div id="locCursor">
          <svg viewBox="0 0 18 18">
            <circle cx="9" cy="9" r="7" fill="none" stroke="#0f380f" stroke-width="2"/>
            <circle cx="9" cy="9" r="7" fill="none" stroke="#9bbc0f" stroke-width="1"/>
            <line x1="9" y1="0" x2="9" y2="4" stroke="#0f380f" stroke-width="2"/>
            <line x1="9" y1="14" x2="9" y2="18" stroke="#0f380f" stroke-width="2"/>
            <line x1="0" y1="9" x2="4" y2="9" stroke="#0f380f" stroke-width="2"/>
            <line x1="14" y1="9" x2="18" y2="9" stroke="#0f380f" stroke-width="2"/>
          </svg>
        </div>
      </div>
      <div class="coord" id="coord"></div>
      <div id="attribution">&copy; OpenStreetMap contributors</div>
      <div id="toast"></div>
    </div>
  </div>

  <div class="controls">
    <div class="dpad">
      <div class="dpad-v"></div>
      <div class="dpad-h"></div>
      <div class="dpad-center"></div>
      <button class="dpad-btn up" data-dir="up"><span class="tri"></span></button>
      <button class="dpad-btn down" data-dir="down"><span class="tri"></span></button>
      <button class="dpad-btn left" data-dir="left"><span class="tri"></span></button>
      <button class="dpad-btn right" data-dir="right"><span class="tri"></span></button>
    </div>
    <div class="ab">
      <button class="round b" id="btnB">B</button>
      <button class="round a" id="btnA">A</button>
    </div>
  </div>

  <div class="meta-row">
    <button class="pill" id="btnSelect">select</button>
    <button class="pill" id="btnStart">start</button>
  </div>
</div>

<p class="hint">
  drag: pan (離すとタイルへスナップ) / d-pad: 1タイル送り<br>
  A: attribution表示切替 / B: 座標表示 / select: ホイールパン切替(LED点灯) / start: 現在地へ
</p>

<script>
const screenEl     = document.getElementById("screen");
const tileViewport = document.getElementById("tileViewport");
const tileGridEl   = document.getElementById("tileGrid");
const attrEl       = document.getElementById("attribution");
const coordEl      = document.getElementById("coord");
const ledEl        = document.getElementById("led");
const locCursor    = document.getElementById("locCursor");
const toastEl      = document.getElementById("toast");

const GB_C0 = "#9bbc0f", GB_C3 = "#0f380f";
attrEl.style.background = GB_C3;
attrEl.style.color = GB_C0;
coordEl.style.background = GB_C3;
coordEl.style.color = GB_C0;
toastEl.style.background = GB_C3;
toastEl.style.color = GB_C0;

let showCoord = true;
let showAttribution = true;
let wheelPanEnabled = false;

// ---------- タイル範囲 ----------
const ZOOM  = 14;
const X_MIN = 14119, X_MAX = 14138; // 20 tiles
const Y_MIN = 6558,  Y_MAX = 6574;  // 17 tiles
const TILE_PX = 256;
const TILES_W = X_MAX - X_MIN + 1;
const TILES_H = Y_MAX - Y_MIN + 1;

const START_TX = X_MIN + Math.floor(TILES_W / 2);
const START_TY = Y_MIN + Math.floor(TILES_H / 2);

let curTx = START_TX, curTy = START_TY;

// ---------- 画面サイズに応じたスケール ----------
// tileViewport は常に256x256基準で組み立て、CSSのvar(--screen)実測値に合わせてscaleする。
function getScreenScale() {
  const rect = screenEl.getBoundingClientRect();
  return rect.width / TILE_PX; // 256基準
}
function applyViewportScale() {
  const s = getScreenScale();
  tileViewport.style.transform = `scale(${s})`;
}

// ---------- タイル座標変換 (Web Mercator) ----------
function deg2tileFloat(lat, lon, zoom) {
  const n = Math.pow(2, zoom);
  const x = (lon + 180) / 360 * n;
  const y = (1 - Math.log(Math.tan(lat*Math.PI/180) + 1/Math.cos(lat*Math.PI/180)) / Math.PI) / 2 * n;
  return { x, y };
}

// ---------- タイルグリッド構築 (256px基準のまま) ----------
tileGridEl.style.gridTemplateColumns = `repeat(${TILES_W}, ${TILE_PX}px)`;
tileGridEl.style.gridTemplateRows    = `repeat(${TILES_H}, ${TILE_PX}px)`;
tileGridEl.style.width  = (TILES_W * TILE_PX) + "px";
tileGridEl.style.height = (TILES_H * TILE_PX) + "px";

let tileLoadFailCount = 0;
for (let ty = Y_MIN; ty <= Y_MAX; ty++) {
  for (let tx = X_MIN; tx <= X_MAX; tx++) {
    const img = document.createElement("img");
    img.width = img.height = TILE_PX;
    img.loading = "eager";
    img.src = `tiles/${ZOOM}/${tx}/${ty}.png`;
    img.onerror = () => {
      tileLoadFailCount++;
      img.onerror = null;
      if (tileLoadFailCount === 1) {
        console.warn("tiles/ の読み込みに失敗しました。tiles ディレクトリが正しい場所にあるか確認してください。");
      }
    };
    tileGridEl.appendChild(img);
  }
}

// ---------- パン (常に256px基準の座標系で計算し、表示はscaleで縮尺する) ----------
let panX = 0, panY = 0;

function tileToPan(tx, ty) {
  return { x: -(tx - X_MIN) * TILE_PX, y: -(ty - Y_MIN) * TILE_PX };
}
function clampTile(tx, ty) {
  return {
    tx: Math.min(X_MAX, Math.max(X_MIN, tx)),
    ty: Math.min(Y_MAX, Math.max(Y_MIN, ty))
  };
}
function applyPan(animate) {
  tileGridEl.style.transition = animate ? "transform 0.12s steps(4)" : "none";
  tileGridEl.style.transform = `translate(${panX}px, ${panY}px)`;
  updateCoord();
}
function goToTile(tx, ty, animate) {
  hideLockOn();
  const c = clampTile(tx, ty);
  curTx = c.tx; curTy = c.ty;
  const p = tileToPan(curTx, curTy);
  panX = p.x; panY = p.y;
  applyPan(animate !== false);
}

function updateCoord() {
  coordEl.style.display = showCoord ? "block" : "none";
  if (showCoord) coordEl.textContent = `z${ZOOM}  x:${curTx}  y:${curTy}`;
}

function showToast(msg, ms) {
  toastEl.textContent = msg;
  toastEl.style.display = "block";
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => { toastEl.style.display = "none"; }, ms || 2200);
}

// ---------- ロックオンカーソル (256px基準の座標をそのまま使えば scale で自動追従する) ----------
function showLockOn(px, py) {
  locCursor.style.left = px + "px";
  locCursor.style.top = py + "px";
  locCursor.style.display = "block";
  clearTimeout(showLockOn._t);
  showLockOn._t = setTimeout(hideLockOn, 4000);
}
function hideLockOn() {
  locCursor.style.display = "none";
}

// ---------- ドラッグ (pointer座標は実画面pxなので、scale分を逆補正してから256px基準に変換) ----------
let dragging = false, dragStartX = 0, dragStartY = 0, dragOriginPanX = 0, dragOriginPanY = 0;

screenEl.addEventListener('pointerdown', e => {
  if (wheelPanEnabled) return;
  dragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  dragOriginPanX = panX; dragOriginPanY = panY;
  tileGridEl.style.transition = "none";
  screenEl.setPointerCapture(e.pointerId);
  hideLockOn();
});
screenEl.addEventListener('pointermove', e => {
  if (!dragging) return;
  const s = getScreenScale();
  panX = dragOriginPanX + (e.clientX - dragStartX) / s;
  panY = dragOriginPanY + (e.clientY - dragStartY) / s;
  tileGridEl.style.transform = `translate(${panX}px, ${panY}px)`;
});
function endDrag() {
  if (!dragging) return;
  dragging = false;
  const tx = X_MIN + Math.round(-panX / TILE_PX);
  const ty = Y_MIN + Math.round(-panY / TILE_PX);
  goToTile(tx, ty, true);
}
screenEl.addEventListener('pointerup', endDrag);
screenEl.addEventListener('pointercancel', endDrag);

// ---------- ホイールパン ----------
screenEl.addEventListener('wheel', e => {
  if (!wheelPanEnabled) return;
  e.preventDefault();
  const s = getScreenScale();
  panX = Math.min(0, Math.max(-(TILES_W*TILE_PX - TILE_PX), panX - e.deltaX / s));
  panY = Math.min(0, Math.max(-(TILES_H*TILE_PX - TILE_PX), panY - e.deltaY / s));
  tileGridEl.style.transition = "none";
  tileGridEl.style.transform = `translate(${panX}px, ${panY}px)`;
  hideLockOn();
  clearTimeout(screenEl._wheelSnap);
  screenEl._wheelSnap = setTimeout(() => {
    const tx = X_MIN + Math.round(-panX / TILE_PX);
    const ty = Y_MIN + Math.round(-panY / TILE_PX);
    goToTile(tx, ty, true);
  }, 220);
}, { passive: false });

// ---------- 十字キー ----------
document.querySelectorAll(".dpad-btn").forEach(btn => {
  btn.addEventListener('click', () => {
    const dir = btn.dataset.dir;
    if (dir === 'up')    goToTile(curTx, curTy - 1);
    if (dir === 'down')  goToTile(curTx, curTy + 1);
    if (dir === 'left')  goToTile(curTx - 1, curTy);
    if (dir === 'right') goToTile(curTx + 1, curTy);
  });
});

// ---------- A: アトリビューション表示切替 ----------
document.getElementById("btnA").onclick = () => {
  showAttribution = !showAttribution;
  attrEl.style.display = showAttribution ? "block" : "none";
};

// ---------- B: 座標表示切替 ----------
document.getElementById("btnB").onclick = () => {
  showCoord = !showCoord;
  updateCoord();
};

// ---------- select: ホイールパン切替。状態はLEDのみで表現 ----------
document.getElementById("btnSelect").onclick = () => {
  wheelPanEnabled = !wheelPanEnabled;
  screenEl.classList.toggle("wheel-pan", wheelPanEnabled);
  ledEl.classList.toggle("on", wheelPanEnabled);
};

// ---------- start: 現在地ジャンプ ----------
document.getElementById("btnStart").onclick = () => {
  if (!navigator.geolocation) {
    showToast("Geolocation\n非対応の環境です");
    goToTile(START_TX, START_TY, true);
    return;
  }
  showToast("現在地を取得中...", 60000);
  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude, longitude } = pos.coords;
      const t = deg2tileFloat(latitude, longitude, ZOOM);
      const tx = Math.floor(t.x), ty = Math.floor(t.y);

      if (tx < X_MIN || tx > X_MAX || ty < Y_MIN || ty > Y_MAX) {
        toastEl.style.display = "none";
        showToast("現在地は福岡市域外です", 2600);
        goToTile(START_TX, START_TY, true);
        return;
      }
      toastEl.style.display = "none";
      goToTile(tx, ty, true);

      const offX = (t.x - tx) * TILE_PX;
      const offY = (t.y - ty) * TILE_PX;
      setTimeout(() => showLockOn(offX, offY), 150);
    },
    err => {
      toastEl.style.display = "none";
      showToast("位置情報を取得できません", 2600);
      goToTile(START_TX, START_TY, true);
    },
    { enableHighAccuracy: true, timeout: 8000 }
  );
};

// ---------- リサイズ対応 ----------
window.addEventListener('resize', applyViewportScale);

// ---------- 初期化 ----------
applyViewportScale();
goToTile(START_TX, START_TY, false);
</script>
</body>
</html>
