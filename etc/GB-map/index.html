<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GBMap - Fukuoka</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a14; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 12px; font-family: 'Courier New', monospace; }
h1 { color: #6a8c10; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; font-weight: normal; }
#info { color: #4a6010; font-size: 10px; letter-spacing: 1px; }
#map-wrap {
  overflow: auto;
  border: 2px solid #3a4c10;
  max-width: 95vw;
  max-height: 80vh;
}
#map {
  display: grid;
  grid-template-columns: repeat(20, 256px);
  grid-template-rows: repeat(17, 256px);
  gap: 0;
}
#map img {
  display: block;
  width: 256px;
  height: 256px;
  image-rendering: pixelated;
}
</style>
</head>
<body>
<h1>GBMap — Fukuoka z14</h1>
<div id="info">zoom=14 / 20×17 tiles / game boy original</div>
<div id="map-wrap">
  <div id="map" id="map"></div>
</div>
<script>
const ZOOM = 14;
const X_MIN = 14119, X_MAX = 14138;
const Y_MIN = 6558,  Y_MAX = 6574;
const map = document.getElementById("map");

for (let ty = Y_MIN; ty <= Y_MAX; ty++) {
  for (let tx = X_MIN; tx <= X_MAX; tx++) {
    const img = document.createElement("img");
    img.src = `tiles/${ZOOM}/${tx}/${ty}.png`;
    img.title = `${tx}/${ty}`;
    map.appendChild(img);
  }
}
</script>
</body>
</html>
