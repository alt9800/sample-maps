<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Nepal Hot Water Spring Sources (WECS 2024)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<style>
  html, body { margin: 0; height: 100%; font-family: -apple-system, "Hiragino Sans", "Helvetica Neue", Arial, sans-serif; }
  #map { position: absolute; top: 0; bottom: 0; width: 100%; }
  #panel {
    position: absolute; top: 12px; left: 12px; z-index: 1;
    background: #ffffff; border: 1px solid #cccccc;
    padding: 10px 14px; font-size: 13px; line-height: 1.6; color: #222222;
    max-width: 300px;
  }
  #panel h1 { font-size: 14px; margin: 0 0 6px 0; }
  #panel p { margin: 4px 0; }
  #panel a { color: #0645ad; }
  .legend-row { display: flex; align-items: center; margin: 4px 0; }
  .legend-icon { width: 18px; height: 18px; margin-right: 6px; flex: 0 0 auto; }
  .legend-text { font-size: 12px; }
  #error-msg {
    display: none; position: absolute; top: 12px; right: 12px; z-index: 1;
    background: #fff3cd; border: 1px solid #cc9a06; color: #333;
    padding: 8px 12px; font-size: 12px; max-width: 280px;
  }
  #lang-switch {
    position: absolute; top: 12px; right: 60px; z-index: 1;
    background: #ffffff; border: 1px solid #cccccc;
    font-size: 12px; padding: 4px 6px;
  }
  .maplibregl-popup-content { font-size: 13px; line-height: 1.6; }
  .maplibregl-popup-content b { display: block; margin-bottom: 4px; }
</style>
</head>
<body>
<div id="map"></div>
<select id="lang-switch">
  <option value="ja">日本語</option>
  <option value="en">English</option>
  <option value="ne">नेपाली</option>
</select>
<div id="panel"></div>
<div id="error-msg"></div>
<script>
const STRINGS = {
  ja: {
    title: 'ネパール温泉地点（識別済み66箇所）',
    legendQualified: '開発基準を満たす（41箇所）',
    legendIdentified: '識別のみ（25箇所）',
    desc: '調査対象162候補のうち66箇所が温泉として識別され（Table 5.1）、うち41箇所は今回のToR（調査仕様書）が定める水温・湧出量等の基準を満たし、観光開発計画（Master Plan）の対象候補となった（Table 5.2）。残り25箇所は識別・記録されたが、基準未達または詳細調査対象外。',
    source: '出典: Water and Energy Commission Secretariat「Study on Identification and Development of Hot Water Spring Sources in Nepal」Final Report, 2024。',
    pdfLink: '原資料PDF（Main Report）',
    usage: '観光・開発促進目的の参考利用。',
    fHwsCode: 'HWSコード',
    fLocalLevel: '行政区分',
    fCategory: '分類',
    fDischarge: '湧出量',
    fTemp: '水温',
    catQualified: '開発基準を満たす',
    catIdentified: '識別のみ',
    errInit: '初期化エラー: ',
  },
  en: {
    title: 'Nepal Hot Water Spring Sources (66 identified)',
    legendQualified: 'Meets development threshold (41 sites)',
    legendIdentified: 'Identified only (25 sites)',
    desc: 'Of 162 candidate sites surveyed, 66 were confirmed as hot water springs (Table 5.1). Of these, 41 met the discharge/temperature thresholds set in the Terms of Reference and became candidates for the tourism Master Plan (Table 5.2). The remaining 25 were identified and recorded but did not meet the threshold or were outside the scope of detailed study.',
    source: 'Source: Water and Energy Commission Secretariat, "Study on Identification and Development of Hot Water Spring Sources in Nepal," Final Report, 2024.',
    pdfLink: 'Original PDF (Main Report)',
    usage: 'For reference use consistent with the report\u2019s tourism/development promotion purpose.',
    fHwsCode: 'HWS code',
    fLocalLevel: 'Local level',
    fCategory: 'Category',
    fDischarge: 'Discharge',
    fTemp: 'Temperature',
    catQualified: 'Meets development threshold',
    catIdentified: 'Identified only',
    errInit: 'Initialization error: ',
  },
  ne: {
    title: 'नेपालका तातोपानी स्रोतहरू (पहिचान गरिएका ६६ स्थान)',
    legendQualified: 'विकास मापदण्ड पूरा गरेका (४१ स्थान)',
    legendIdentified: 'पहिचान मात्र भएका (२५ स्थान)',
    desc: 'सर्वेक्षण गरिएका १६२ सम्भावित स्थानमध्ये ६६ स्थान तातोपानीको रूपमा पुष्टि भए (तालिका ५.१)। तीमध्ये ४१ स्थानले अध्ययनको सर्तपत्र (ToR) मा तोकिएको तापक्रम र प्रवाह मापदण्ड पूरा गरी पर्यटन गुरुयोजनाको उम्मेदवार बने (तालिका ५.२)। बाँकी २५ स्थान पहिचान तथा अभिलेखीकरण मात्र भए, मापदण्ड पूरा नभएको वा विस्तृत अध्ययनको दायराभन्दा बाहिर परेको कारणले।',
    source: 'स्रोत: जल तथा ऊर्जा आयोग सचिवालय (WECS), "Study on Identification and Development of Hot Water Spring Sources in Nepal", अन्तिम प्रतिवेदन, २०२४।',
    pdfLink: 'मूल PDF (Main Report)',
    usage: 'प्रतिवेदनको पर्यटन/विकास प्रवर्द्धन उद्देश्यसँग मिल्दो सन्दर्भ प्रयोगका लागि मात्र।',
    fHwsCode: 'HWS कोड',
    fLocalLevel: 'स्थानीय तह',
    fCategory: 'वर्गीकरण',
    fDischarge: 'प्रवाह',
    fTemp: 'तापक्रम',
    catQualified: 'विकास मापदण्ड पूरा',
    catIdentified: 'पहिचान मात्र',
    errInit: 'सुरुवात त्रुटि: ',
  }
};

let currentLang = 'ja';

function renderPanel(lang) {
  const t = STRINGS[lang];
  document.getElementById('panel').innerHTML = `
    <h1>${t.title}</h1>
    <div class="legend-row">${PIN_SVG('#b5482f', '#7a2f1c')}<span class="legend-text">${t.legendQualified}</span></div>
    <div class="legend-row">${PIN_SVG('#ffffff', '#607d8b')}<span class="legend-text">${t.legendIdentified}</span></div>
    <p style="font-size:11px; color:#555;">${t.desc}</p>
    <p style="font-size:11px;">
      ${t.source}<br>
      <a href="https://giwmscdntwo.gov.np/media/pdf_upload/Main%20Report%20of%20Study%20on%20Identification%20and%20Development%20of%20Hot%20Water%20Spring%20Sources%20in%20Nepal_vzd62om.pdf" target="_blank" rel="noopener">${t.pdfLink}</a><br>
      ${t.usage}
    </p>
  `;
}

function PIN_SVG(fillColor, strokeColor) {
  return `<svg class="legend-icon" viewBox="0 0 24 32"><path d="M12 0C6.5 0 2 4.5 2 10c0 7.5 10 21 10 21s10-13.5 10-21C22 4.5 17.5 0 12 0z" fill="${fillColor}" stroke="${strokeColor}" stroke-width="1.5"/><circle cx="12" cy="10" r="4" fill="#ffffff" stroke="${strokeColor}" stroke-width="1"/></svg>`;
}

document.getElementById('lang-switch').addEventListener('change', (e) => {
  currentLang = e.target.value;
  renderPanel(currentLang);
});

renderPanel(currentLang);

const DATA_URL = 'hotsprings_66.geojson';

const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      'osm': {
        type: 'raster',
        tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
        tileSize: 256,
        attribution: '&copy; OpenStreetMap contributors'
      }
    },
    layers: [{ id: 'osm', type: 'raster', source: 'osm' }]
  },
  center: [83.5, 28.5],
  zoom: 6
});

map.addControl(new maplibregl.NavigationControl(), 'top-right');

function svgToDataUrl(svg) {
  return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
}

function makeSpringSvg(fillColor, strokeColor, hollow) {
  const innerFill = hollow ? '#ffffff' : '#ffffff';
  return `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="64" viewBox="0 0 24 32">
    <path d="M12 0C6.5 0 2 4.5 2 10c0 7.5 10 21 10 21s10-13.5 10-21C22 4.5 17.5 0 12 0z"
          fill="${fillColor}" stroke="${strokeColor}" stroke-width="1.5"/>
    <circle cx="12" cy="10" r="4" fill="${innerFill}" stroke="${strokeColor}" stroke-width="1"/>
  </svg>`;
}

function loadIcon(map, name, svg) {
  return new Promise((resolve, reject) => {
    const img = new Image(64, 64);
    img.onload = () => {
      map.addImage(name, img, { pixelRatio: 2 });
      resolve();
    };
    img.onerror = reject;
    img.src = svgToDataUrl(svg);
  });
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

map.on('load', async () => {
  try {
    await Promise.all([
      loadIcon(map, 'spring-qualified', makeSpringSvg('#b5482f', '#7a2f1c', false)),
      loadIcon(map, 'spring-identified', makeSpringSvg('#ffffff', '#607d8b', true))
    ]);

    const res = await fetch(DATA_URL);
    if (!res.ok) throw new Error('geojson fetch failed: HTTP ' + res.status);
    const data = await res.json();

    map.addSource('hotsprings', { type: 'geojson', data });

    map.addLayer({
      id: 'springs-icon',
      type: 'symbol',
      source: 'hotsprings',
      layout: {
        'icon-image': ['case', ['==', ['get', 'over_threshold'], true], 'spring-qualified', 'spring-identified'],
        'icon-size': 0.75,
        'icon-anchor': 'bottom',
        'icon-allow-overlap': true,
        'icon-ignore-placement': true
      }
    });

    map.on('click', 'springs-icon', (e) => {
      const p = e.features[0].properties;
      const t = STRINGS[currentLang];
      const coords = e.features[0].geometry.coordinates.slice();
      const rows = [
        [t.fHwsCode, p.hws_code],
        [t.fLocalLevel, p.local_level],
        [t.fCategory, p.over_threshold ? t.catQualified : t.catIdentified],
      ];
      if (p.over_threshold) {
        rows.push([t.fDischarge, p.discharge_l_s + ' L/s']);
        rows.push([t.fTemp, p.temp_c + ' \u00b0C']);
      }
      const html = '<b>' + p.name + '</b>' + rows.map(r => r[0] + ': ' + r[1]).join('<br>');
      new maplibregl.Popup().setLngLat(coords).setHTML(html).addTo(map);
    });

    map.on('mouseenter', 'springs-icon', () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', 'springs-icon', () => { map.getCanvas().style.cursor = ''; });

  } catch (err) {
    showError(STRINGS[currentLang].errInit + err.message);
    console.error(err);
  }
});
</script>
</body>
</html>
